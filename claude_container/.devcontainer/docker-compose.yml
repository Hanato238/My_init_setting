# claude 関数用汎用テンプレート
# container_name は `claude` 関数が (Get-Item .).Name（ディレクトリ名）で参照する。
# このテンプレートをコピーして使う際はプロジェクトのディレクトリ名に合わせること。

services:
  node:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    user: node
    container_name: claude-template   # ← プロジェクトのディレクトリ名に変更すること
    volumes:
      - ..:/workspace:cached
      - .:/workspace/.devcontainer:ro
      - ../.mcp.json:/workspace/.mcp.json:ro
      - /c/Users/lesen/.gemini:/home/node/.gemini
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      - ANTHROPIC_API_KEY
